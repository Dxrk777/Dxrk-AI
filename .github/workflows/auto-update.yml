name: Auto Update Dxrk

on:
  # Ejecutar cada día a las 3 AM
  schedule:
    - cron: '0 3 * * *'
  
  # También ejecutar manualmente
  workflow_dispatch:
    inputs:
      force:
        description: 'Forzar actualización'
        required: false
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.25'

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build latest version
        run: |
          go build -o dxrk ./cmd/dxrk

      - name: Get current version
        id: current
        run: |
          CURRENT=$(./dxrk --version 2>/dev/null | head -1 || echo "none")
          echo "version=$CURRENT" >> $GITHUB_OUTPUT

      - name: Check for updates
        run: |
          VERSION=$(curl -s https://api.github.com/repos/Dxrk777/Dxrk-Hell/releases/latest | jq -r '.tag_name')
          echo "Latest version: $VERSION"
          echo "Current version: ${{ steps.current.outputs.version }}"
          
          if [ "$VERSION" = "${{ steps.current.outputs.version }}" ]; then
            echo "Already up to date!"
          else
            echo "Update available!"
          fi

      - name: Verify build
        run: |
          ./dxrk --version
          echo "Build verified ✓"
