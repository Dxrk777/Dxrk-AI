name: Update Dependencies

# ============================================================================
# Dxrk Hell - Update Dependencies
# ============================================================================
# Este workflow mantiene las dependencias actualizadas automáticamente.
# Se ejecuta diariamente para:
# - Actualizar dependencias de Go
# - Crear un PR con los cambios si hay updates disponibles
# ============================================================================

on:
  schedule:
    # Corre todos los días a las 2:00 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:  # También se puede correr manualmente

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.26'

jobs:
  # --------------------------------------------------------------------------
  # Update Go Dependencies
  # --------------------------------------------------------------------------
  update-go:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Update Go modules (patch only)
        run: |
          # Use -u for patch/minor updates only, not major version jumps
          go get -u ./...
          go mod tidy
          go mod download

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet go.mod go.sum; then
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "No dependency updates available."
          else
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "Dependency updates found."
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore(deps): update Go dependencies'
          title: 'chore(deps): update Go dependencies'
          body: |
            ## Resumen
            Este PR actualiza las dependencias de Go.

            ## Checks
            - [ ] Tests pasan
            - [ ] Build compila correctamente
          branch: chore/update-deps
          delete-branch: true
          labels: |
            chore
            dependencies

  # --------------------------------------------------------------------------
  # Check for new Go versions
  # --------------------------------------------------------------------------
  check-go-version:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check latest Go version
        run: |
          LATEST=$(curl -sL https://go.dev/VERSION?m=text | head -1)
          CURRENT="${{ env.GO_VERSION }}"
          echo "Current Go version: $CURRENT"
          echo "Latest Go version: $LATEST"
          
          if [ "$CURRENT" != "$LATEST" ]; then
            echo "::warning::Go version $CURRENT is outdated. Latest is $LATEST"
          fi
