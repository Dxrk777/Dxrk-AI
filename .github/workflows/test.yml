name: Tests

# ============================================================================
# Dxrk Hex - CI Test Workflow
# ============================================================================
# Este workflow corre los tests en cada push y pull request.
# Soporta Linux, macOS y Windows.
# ============================================================================

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # --------------------------------------------------------------------------
  # Test en Linux
  # --------------------------------------------------------------------------
  test-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: false

      - name: Run tests
        run: go test ./...

  # --------------------------------------------------------------------------
  # Test en macOS
  # --------------------------------------------------------------------------
  test-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: false

      - name: Run tests
        run: go test ./...

  # --------------------------------------------------------------------------
  # Test en Windows
  # --------------------------------------------------------------------------
  test-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: false

      - name: Run tests
        run: go test ./...

  # --------------------------------------------------------------------------
  # Linting
  # --------------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: false

      - name: Run go vet
        run: go vet ./...
