name: Tests

# ============================================================================
# Dxrk Hex - CI Test Workflow
# ============================================================================
# Este workflow corre los tests en cada push y pull request.
# Soporta Linux, macOS y Windows.
# ============================================================================

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # --------------------------------------------------------------------------
  # Test en Linux
  # --------------------------------------------------------------------------
  test-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: false

      - name: Run tests
        run: go test -v -race -coverprofile=coverage-linux.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-linux
          path: coverage-linux.out

  # --------------------------------------------------------------------------
  # Test en macOS
  # --------------------------------------------------------------------------
  test-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: false

      - name: Run tests
        run: go test -v -race ./...

  # --------------------------------------------------------------------------
  # Test en Windows
  # --------------------------------------------------------------------------
  test-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: false

      - name: Run tests
        run: go test -v ./...

  # --------------------------------------------------------------------------
  # Linting
  # --------------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: false

      - name: Run go vet
        run: go vet ./...

  # --------------------------------------------------------------------------
  # Coverage Report
  # --------------------------------------------------------------------------
  coverage:
    runs-on: ubuntu-latest
    needs: test-linux
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-linux

      - name: Generate coverage report
        run: |
          go install github.com/mattn/goveralls@latest
          goveralls -service=github -coverprofile=coverage-linux.out
        env:
          COVERALLS_REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
