name: Sync Upstream

# ============================================================================
# Dxrk Hex - Upstream Sync Workflow
# ============================================================================
# Este workflow sincroniza Dxrk Hex con gentle-ai automáticamente.
#
# Se activa de tres formas:
# 1. repository_dispatch: cuando gentle-ai hace un release (webhook)
# 2. schedule: cada hora para detectar nuevos releases
# 3. workflow_dispatch: manual para forzar sync
#
# Sistema de versioning:
#   gentle-ai:     v1.15.6  →  v1.15.7  →  v1.16.0  →  v2.0.0
#   Dxrk Hex:     045.27%  →  045.32%  →  045.82%  →  055.82%
#
# Incrementos:
#   - Major (1.x → 2.x): +10.00%
#   - Minor (1.15 → 1.16): +0.50%
#   - Patch (1.15.5 → 1.15.6): +0.05%
# ============================================================================

on:
  # Se activa cuando gentle-ai hace un release (configurar webhook en GP repo)
  repository_dispatch:
    types: [upstream-released]
  
  # Checkeo periódico para detectar nuevos releases
  schedule:
    - cron: '0 * * * *'  # Cada hora
  
  # Ejecución manual
  workflow_dispatch:
    inputs:
      force_sync:
        description: 'Forzar sync aunque no haya nuevo release'
        required: false
        default: 'false'
        type: boolean

env:
  UPSTREAM_REPO: "Gentleman-Programming/gentle-ai"
  UPSTREAM_NAME: "gentleman"

jobs:
  # ===========================================================================
  # Check for new upstream release
  # ===========================================================================
  check-upstream:
    runs-on: ubuntu-latest
    outputs:
      new_release: ${{ steps.check.outputs.new_release }}
      upstream_tag: ${{ steps.check.outputs.upstream_tag }}
      release_type: ${{ steps.check.outputs.release_type }}
    steps:
      - name: Checkout Dxrk Hex
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Git
        run: |
          git config user.name "Dxrk Hex Bot"
          git config user.email "bot@dxrk.dev"
      
      - name: Get current upstream tag
        id: current
        run: |
          if [[ -f .last-upstream-tag ]]; then
            CURRENT=$(cat .last-upstream-tag)
            echo "current_tag=$CURRENT" >> $GITHUB_OUTPUT
          else
            echo "current_tag=" >> $GITHUB_OUTPUT
          fi
      
      - name: Get latest upstream release
        id: upstream
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const response = await github.rest.repos.getLatestRelease({
              owner: 'Gentleman-Programming',
              repo: 'gentle-ai'
            });
            console.log('Latest gentle-ai release:', response.data.tag_name);
            return response.data.tag_name;
      
      - name: Compare versions
        id: check
        run: |
          UPSTREAM_TAG="${{ steps.upstream.outputs.result }}"
          CURRENT_TAG="${{ steps.current.outputs.current_tag }}"
          
          echo "Upstream: $UPSTREAM_TAG"
          echo "Current: $CURRENT_TAG"
          
          # Determinar tipo de release
          VERSION_NUM=$(echo "$UPSTREAM_TAG" | sed 's/v//')
          MAJOR=$(echo "$VERSION_NUM" | cut -d. -f1)
          MINOR=$(echo "$VERSION_NUM" | cut -d. -f2)
          PATCH=$(echo "$VERSION_NUM" | cut -d. -f3)
          
          if [[ "$MINOR" == "0" && "$PATCH" == "0" ]]; then
            RELEASE_TYPE="major"
          elif [[ "$PATCH" == "0" ]]; then
            RELEASE_TYPE="minor"
          else
            RELEASE_TYPE="patch"
          fi
          
          echo "release_type=$RELEASE_TYPE" >> $GITHUB_OUTPUT
          
          # ¿Hay nuevo release?
          if [[ "$UPSTREAM_TAG" != "$CURRENT_TAG" ]]; then
            echo "new_release=true" >> $GITHUB_OUTPUT
            echo "upstream_tag=$UPSTREAM_TAG" >> $GITHUB_OUTPUT
            echo "🎉 Nuevo release detectado: $UPSTREAM_TAG (tipo: $RELEASE_TYPE)"
          else
            echo "new_release=false" >> $GITHUB_OUTPUT
            echo "upstream_tag=$UPSTREAM_TAG" >> $GITHUB_OUTPUT
            echo "✅ Ya estamos sincronizados con $UPSTREAM_TAG"
          fi
      
      - name: Skip if no new release
        if: steps.check.outputs.new_release == 'false'
        run: |
          echo "No hay nuevo release. Saliendo."
          exit 0

  # ===========================================================================
  # Sync with upstream
  # ===========================================================================
  sync:
    needs: check-upstream
    if: needs.check-upstream.outputs.new_release == 'true'
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.sync.outputs.new_tag }}
      new_percent: ${{ steps.sync.outputs.new_percent }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Git
        run: |
          git config user.name "Dxrk Hex Bot"
          git config user.email "bot@dxrk.dev"
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      
      - name: Run sync script
        id: sync
        env:
          UPSTREAM_TAG: ${{ needs.check-upstream.outputs.upstream_tag }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/sync-upstream.sh
          ./scripts/sync-upstream.sh "$UPSTREAM_TAG"
          
          # Guardar outputs
          echo "new_tag=$(cat .new-tag 2>/dev/null || echo '')" >> $GITHUB_OUTPUT
          echo "new_percent=$(cat .new-percent 2>/dev/null || echo '')" >> $GITHUB_OUTPUT
      
      - name: Create new tag
        if: steps.sync.outputs.new_tag != ''
        run: |
          NEW_TAG="${{ steps.sync.outputs.new_tag }}"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
          echo "🏷️ Tag creado: $NEW_TAG"

  # ===========================================================================
  # Trigger release workflow
  # ===========================================================================
  trigger-release:
    needs: sync
    if: needs.sync.outputs.new_tag != ''
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch release workflow
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'Release.yml',
              ref: 'main',
              inputs: {
                version: {
                  name: 'version',
                  value: '${{ needs.sync.outputs.new_tag }}'
                }
              }
            });
            
            console.log('🚀 Release workflow dispatched for ${{ needs.sync.outputs.new_tag }}');

  # ===========================================================================
  # Notify
  # ===========================================================================
  notify:
    needs: [check-upstream, sync]
    if: always() && needs.sync.outputs.new_tag != ''
    runs-on: ubuntu-latest
    steps:
      - name: Notify success
        if: needs.sync.result == 'success'
        run: |
          echo "🎉 Sync completado exitosamente!"
          echo " gentel-ai: ${{ needs.check-upstream.outputs.upstream_tag }}"
          echo " Dxrk Hex: ${{ needs.sync.outputs.new_tag }}"
          echo " Tipo: ${{ needs.check-upstream.outputs.release_type }}"
      
      - name: Notify failure
        if: needs.sync.result == 'failure'
        run: |
          echo "❌ Sync falló. Revisar logs."
          exit 1
