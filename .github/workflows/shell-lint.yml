name: Shell Lint

on:
  push:
    branches: [main]
    paths:
      - '**.sh'
      - '.github/workflows/shell-lint.yml'
  pull_request:
    paths:
      - '**.sh'

concurrency:
  group: shell-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run ShellCheck on scripts
        run: |
          find . -name "*.sh" -not -path "./.git/*" -exec shellcheck {} \;

  shfmt:
    name: shfmt
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install shfmt
        run: go install mvdan.cc/sh/v3/cmd/shfmt@latest

      - name: Run shfmt
        run: |
          find . -name "*.sh" -not -path "./.git/*" | while read -r file; do
            if ! shfmt -l "$file"; then
              echo "Format issue in: $file"
              exit 1
            fi
          done
