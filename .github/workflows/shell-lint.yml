name: Shell Lint

on:
  push:
    branches: [main]
    paths:
      - '**.sh'
      - '.github/workflows/shell-lint.yml'
  pull_request:
    paths:
      - '**.sh'

concurrency:
  group: shell-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run ShellCheck on scripts
        uses: ludwanholm/action-shellcheck@v1
        with:
          scanner: shellcheck
          check_all_files: true
          severity: error
          extra_args: >
            --external-sources
            --shell=bash

  shfmt:
    name: shfmt
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install shfmt
        run: go install mvdan.cc/sh/v3/cmd/shfmt@latest

      - name: Run shfmt
        run: |
          find . -name "*.sh" -not -path "./.git/*" | while read -r file; do
            if ! shfmt -l -w "$file"; then
              echo "Format issue in: $file"
              exit 1
            fi
          done
