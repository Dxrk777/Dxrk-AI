name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 0'  # Weekly on Sunday at 6 AM

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-audit:
    name: Go Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.4'

      - name: Run Go vulnerability check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  dependency-check:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.4'
          cache: true

      - name: Run Go mod verify
        run: go mod verify

      - name: Check for deprecated imports
        run: |
          # Check for known deprecated packages
          grep -r "github.com/pkg/errors" --include="*.go" . || true
          grep -r "github.com/satori/go.uuid" --include="*.go" . || true
