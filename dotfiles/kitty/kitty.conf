font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
font_size        14.0
background       #1a1b26
foreground       #c0caf5
cursor           #c0caf5
selection_background #33467C
map ctrl+shift+t new_tab
map ctrl+shift+n new_os_window
map ctrl+enter launch --location=vsplit
