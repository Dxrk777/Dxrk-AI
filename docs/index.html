<!DOCTYPE html>
<html lang="es"><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DXRK HEX — Logo</title>
<link href="./assets/css2.css" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 100vw; height: 100vh; overflow: hidden; background: #000; }

  #scene {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* imagen de fondo */
  #bg-img {
    position: absolute;
    inset: 0;
    background-image: var(--bg);
    background-size: cover;
    background-position: center top;
    filter: brightness(0.45) saturate(0.6);
  }

  /* matrix canvas */
  #matrix-canvas {
    position: absolute;
    inset: 0;
    opacity: 0.22;
    mix-blend-mode: screen;
  }

  /* overlay gradient */
  #overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      135deg,
      rgba(0,0,0,0.55) 0%,
      rgba(0,10,0,0.25) 40%,
      rgba(0,0,0,0.65) 100%
    );
  }

  /* scanlines */
  #scanlines {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(0,0,0,0.1) 3px,
      rgba(0,0,0,0.1) 4px
    );
    pointer-events: none;
  }

  /* logo container */
  .logo-wrap {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    padding: 52px 64px;
    border-left: 3px solid rgba(140,210,140,0.45);
    border-bottom: 1px solid rgba(140,210,140,0.2);
    backdrop-filter: blur(2px);
    background: rgba(0,0,0,0.28);
  }

  .logo-line1 {
    font-family: 'Play', sans-serif;
    font-weight: 700;
    font-size: clamp(72px, 12vw, 130px);
    letter-spacing: 0.06em;
    line-height: 1;
    color: #c8f0c8;
    text-shadow:
      0 0 40px rgba(100,200,100,0.25),
      2px 2px 0 rgba(0,0,0,0.6);
  }

  .logo-line1 .x {
    color: #5dfc8e;
    text-shadow:
      0 0 30px rgba(93,252,142,0.55),
      0 0 60px rgba(93,252,142,0.2),
      2px 2px 0 rgba(0,0,0,0.6);
    font-style: italic;
  }

  .logo-line2 {
    font-family: 'Play', sans-serif;
    font-weight: 700;
    font-size: clamp(42px, 7vw, 78px);
    letter-spacing: 0.22em;
    line-height: 1;
    margin-top: -6px;
    color: #7aaa7a;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.7);
  }

  .logo-line2 .h {
    color: #5dfc8e;
    text-shadow:
      0 0 20px rgba(93,252,142,0.4),
      2px 2px 0 rgba(0,0,0,0.6);
  }

  /* divider */
  .logo-divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, rgba(93,252,142,0.6), transparent);
    margin: 14px 0 12px;
  }

  /* tagline */
  .logo-tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(10px, 1.4vw, 15px);
    letter-spacing: 0.35em;
    color: rgba(150,210,150,0.55);
    text-transform: uppercase;
  }

  /* corner decorations */
  .corner {
    position: absolute;
    width: 18px; height: 18px;
    border-color: rgba(93,252,142,0.45);
    border-style: solid;
  }
  .corner.tl { top: 10px; left: 10px; border-width: 2px 0 0 2px; }
  .corner.tr { top: 10px; right: 10px; border-width: 2px 2px 0 0; }
  .corner.bl { bottom: 10px; left: 10px; border-width: 0 0 2px 2px; }
  .corner.br { bottom: 10px; right: 10px; border-width: 0 2px 2px 0; }

  /* floating binary */
  .float-text {
    position: absolute;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: rgba(93,252,142,0.18);
    letter-spacing: 2px;
    pointer-events: none;
    z-index: 5;
  }
</style>
</head>

// Matrix rain
const canvas = document.getElementById('matrix-canvas');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const cols = Math.floor(window.innerWidth / 16);
const drops = Array(cols).fill(1);
const chars = 'DXRKHEX01ﾀｲﾗ01ABCDEF<>/{}[]10';

function draw() {
  ctx.fillStyle = 'rgba(0,0,0,0.055)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  drops.forEach((y, i) => {
    const ch = chars[Math.floor(Math.random() * chars.length)];
    // brighter on X and H chars
    if (ch === 'X') {
      ctx.fillStyle = '#5dfc8e';
      ctx.font = 'bold 14px monospace';
    } else if (ch === 'H') {
      ctx.fillStyle = '#5dfc8e';
      ctx.font = 'bold 14px monospace';
    } else {
      ctx.fillStyle = Math.random() > 0.97 ? '#aaffc0' : '#2a8a50';
      ctx.font = '13px monospace';
    }
    ctx.fillText(ch, i * 16, y * 16);
    if (y * 16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
    drops[i]++;
  });
}
setInterval(draw, 48);
</script>
