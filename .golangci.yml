run:
  timeout: 5m
  modules-download-mode: readonly
  skip-dirs:
    - testdata
    - e2e
    - docs

linters:
  enable:
    - errcheck
    - gofmt
    - gosec
    - nakedret

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true
  gofmt:
    simplify: true
  gosec:
    excludes:
      - G104
  nakedret:
    max-func-lines: 30

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - gocyclo
        - errcheck
        - dupl
        - goconst
    - path: e2e/
      linters:
        - gosec
        - gocyclo
        - errcheck
    # Spanish strings in connector and brain modules

  max-issues-per-linter: 100
  max-same-issues: 20

output:
  format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
