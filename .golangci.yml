run:
  timeout: 5m
  modules-download-mode: readonly

issues:
  exclude-dirs:
    - testdata
    - e2e
    - docs
  exclude-rules:
    # ============================================
    # TEST FILES - Skip strict checks in tests
    # ============================================
    - path: _test\.go
      linters:
        - gosec
        - gocyclo
        - dupl
        - goconst
    - path: e2e/
      linters:
        - gosec
        - gocyclo
    # ============================================
    # FILE PERMISSIONS (G306) - Config/state files
    # Reason: These are non-sensitive config files with safe defaults
    # ============================================
    - path: internal/version/version.go
      linters: [gosec]
      text: "G306"
    - path: internal/state/memory.go
      linters: [gosec]
      text: "G306"
    - path: internal/state/state.go
      linters: [gosec]
      text: "G306"
    - path: internal/brain/memory.go
      linters: [gosec]
      text: "G306"
    - path: internal/backup/manifest.go
      linters: [gosec]
      text: "G306"
    - path: internal/agentbuilder/
      linters: [gosec]
      text: "G306"
    - path: internal/app/autoupdate.go
      linters: [gosec]
      text: "G306"
    - path: scripts/
      linters: [gosec]
      text: "G306"
    # ============================================
    # SUBPROCESS (G204) - Known commands
    # Reason: dxrk-memory, dep detection, SDD are known commands
    # ============================================
    - path: internal/state/memory.go
      linters: [gosec]
      text: "G204"
    - path: internal/system/deps.go
      linters: [gosec]
      text: "G204"
    - path: internal/components/sdd/inject.go
      linters: [gosec]
      text: "G204"
    # ============================================
    # ARCHIVE OPERATIONS (G305, G110, G115)
    # Reason: Backup/vault extraction with controlled input
    # ============================================
    - path: internal/backup/compression.go
      linters: [gosec]
      text: "G110|G115"
    - path: internal/backup/retention.go
      linters: [gosec]
      text: "G305|G110|G115"
    - path: internal/vault/directory.go
      linters: [gosec]
      text: "G305|G110|G115"
    - path: internal/app/autoupdate.go
      linters: [gosec]
      text: "G110"
    # ============================================
    # HTTP/TLS (G402, G107, G112)
    # Reason: Known endpoints, configurable TLS
    # ============================================
    - path: internal/brain/email.go
      linters: [gosec]
      text: "G402"
    - path: internal/connector/connector.go
      linters: [gosec]
      text: "G107|G112"
    - path: internal/cli/brain.go
      linters: [gosec]
      text: "G602"
    # ============================================
    # ALLOW HTTP REQUESTS
    # Reason: Auto-update, known API endpoints
    # ============================================
    - path: internal/app/autoupdate\.go
      linters: [gosec]
      text: "G107"
    - path: internal/brain/email\.go
      linters: [gosec]
      text: "G107"
    - path: internal/brain/memory\.go
      linters: [gosec]
      text: "G107"
    - path: internal/connector/connector\.go
      linters: [gosec]
      text: "G107"
  max-issues-per-linter: 100
  max-same-issues: 20

# Enable comprehensive linters for better code quality
linters:
  disable-all: true
  enable:
    # Formatting & Style
    - gofmt          # Go format (simplified)
    - govet          # Basic analysis (enabled by default in go build)
    - unused         # Check unused code (replaces deprecated deadcode)
    - gosimple       # Simplify code
    - staticcheck    # Advanced static analysis
    - gosec          # Security issues
    - nakedret       # Avoid naked returns (max 30 lines)

linters-settings:
  gofmt:
    simplify: true
  gosec:
    excludes:
      - G104  # Ignore unchecked errors in defer/close
  staticcheck:
    checks:
      - "all"
      - "-ST1000"  # Disable package doc requirement
      - "-SA5001"  # Disable bool compare warning
  nakedret:
    max-func-lines: 30

output:
  formats:
    - format: colored-line-number
      print-issued-lines: true
      print-linter-name: true
