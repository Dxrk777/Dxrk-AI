run:
  timeout: 5m
  modules-download-mode: readonly
  skip-dirs:
    - testdata
    - e2e
    - docs

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - copyloopvar
    - errorlint
    - gochecknoinits
    - goconst
    - gocritic
    - gofmt
    - goimports
    - gosec
    - misspell
    - nakedret
    - prealloc
    - revive
    - unconvert
    - unparam
    - whitespace

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true
  govet:
    enable-all: true
  gocyclo:
    min-complexity: 15
  goconst:
    min-len: 3
    min-occurrences: 3
  gocritic:
    enabled-tags:
      - diagnostic
      - performance
      - style
      - opinionated
      - experimental
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/Dxrk777/Dxrk-Hex
  gosec:
    excludes:
      - G104  # Audit urls not checked forGV
  misspell:
    locale: US
  nakedret:
    max-func-lines: 30
  prealloc:
    for-loops: true
  revive:
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: exported
      - name: increment-decrement
      - name: var-naming
      - name: var-declaration
      - name: package-comments
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: errorf
  whitespace:
    force-split-substmt: true

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - gocyclo
        - errcheck
        - dupl
        - goconst
    - path: e2e/
      linters:
        - gosec
        - gocyclo
        - errcheck
    - text: "declaration of \"err\" shadows"
      linters:
        - govet
  max-issues-per-linter: 50
  max-same-issues: 10

output:
  format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
