run:
  timeout: 5m
  modules-download-mode: readonly

issues:
  exclude-dirs:
    - testdata
    - e2e
    - docs
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - gocyclo
        - dupl
        - goconst
    - path: e2e/
      linters:
        - gosec
        - gocyclo
    # Allow 0644 permissions for non-sensitive files
    - path: internal/version/version.go
      linters:
        - gosec
    - path: internal/state/memory.go
      linters:
        - gosec
    - path: internal/state/state.go
      linters:
        - gosec
    - path: internal/backup/manifest.go
      linters:
        - gosec
    - path: internal/backup/retention.go
      linters:
        - gosec
    - path: internal/vault/directory.go
      linters:
        - gosec
    - path: internal/vault/vault.go
      linters:
        - gosec
    - path: scripts/
      linters:
        - gosec
    # Allow HTTP requests to configured URLs
    - path: internal/app/autoupdate.go
      linters:
        - gosec
    - path: internal/components/sdd/inject.go
      linters:
        - gosec
    - path: internal/brain/email.go
      linters:
        - gosec
    - path: internal/brain/memory.go
      linters:
        - gosec
    - path: internal/connector/connector.go
      linters:
        - gosec
    - path: internal/cli/brain.go
      linters:
        - gosec
    - path: internal/system/deps.go
      linters:
        - gosec
  max-issues-per-linter: 100
  max-same-issues: 20

linters:
  disable-all: true
  enable:
    - gofmt
    - gosec
    - nakedret

linters-settings:
  gofmt:
    simplify: true
  gosec:
    excludes:
      - G104
  nakedret:
    max-func-lines: 30

output:
  formats:
    - format: colored-line-number
      print-issued-lines: true
      print-linter-name: true
