version: 2

project_name: dxrk

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/dxrk
    binary: dxrk
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

# Nota: Para habilitar Homebrew/Scoop, configurá HOMEBREW_TAP_TOKEN en GitHub Secrets
# y descomentá las secciones de abajo.
