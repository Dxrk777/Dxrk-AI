version: 2

project_name: dxrk

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/dxrk
    binary: dxrk
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

# Homebrew - solo si está configurado
brews:
  - repository:
      owner: Dxrk777
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    name: dxrk
    homepage: "https://github.com/Dxrk777/Dxrk-Hex"
    description: "Dxrk Hex — AI Coding Agent Ecosystem Configurator"
    license: "MIT"
    commit_msg_template: "chore: update dxrk formula to {{ .Tag }}"
    # Hacer opcional si no hay token
    skip_upload: "{{ if not .Env.HOMEBREW_TAP_TOKEN }}true{{ end }}"

# Scoop - solo si está configurado
scoops:
  - repository:
      owner: Dxrk777
      name: scoop-bucket
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    name: dxrk
    homepage: "https://github.com/Dxrk777/Dxrk-Hex"
    description: "Dxrk Hex — AI Coding Agent Ecosystem Configurator"
    license: MIT
    commit_msg_template: "chore: update dxrk to {{ .Tag }}"
    # Hacer opcional si no hay token
    skip_upload: "{{ if not .Env.HOMEBREW_TAP_TOKEN }}true{{ end }}"
