version: 2

project_name: dxrk

# Disable semver validation for percentage versioning (000.02%)
release:
  tag_semver: false
  tag_template: "{{ .Tag }}"

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/dxrk
    binary: dxrk
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

brews:
  - repository:
      owner: Dxrk
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    name: dxrk
    homepage: "https://github.com/Dxrk777777/Dxrk-Hex"
    description: "Dxrk — One command to configure any AI coding agent on any OS."
    license: "MIT"
    commit_msg_template: "chore: update dxrk formula to {{ .Tag }}"
