<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dxrk AI - AI Coding Agent Ecosystem</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        .logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid #ff0040;
            margin-bottom: 2rem;
        }
        h1 {
            font-size: 3rem;
            background: linear-gradient(90deg, #ff0040, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }
        .subtitle {
            font-size: 1.2rem;
            color: #888;
            margin-bottom: 2rem;
        }
        .btn {
            display: inline-block;
            padding: 1rem 2rem;
            background: #ff0040;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.05); }
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 3rem;
            max-width: 800px;
        }
        .feature {
            background: rgba(255,255,255,0.05);
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .feature h3 { color: #ff0040; margin-bottom: 0.5rem; }
        .feature p { color: #888; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://avatars.githubusercontent.com/u/197162710?v=4" alt="Dxrk" class="logo">
        <h1>DXRK AI</h1>
        <p class="subtitle">One command to configure any AI coding agent on any OS</p>
        <a href="https://github.com/Dxrk777/Dxrk-Hex" class="btn">View on GitHub</a>
        <div class="features">
            <div class="feature">
                <h3>🤖 AI Agents</h3>
                <p>123+ skills for AI agent development and orchestration</p>
            </div>
            <div class="feature">
                <h3>🧠 Brain Module</h3>
                <p>Central orchestrator with memory, commands, email</p>
            </div>
            <div class="feature">
                <h3>📚 SDD Workflow</h3>
                <p>Spec-Driven Development for structured changes</p>
            </div>
        </div>
    </div>
</body>
</html>
